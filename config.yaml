# Personal Agent — behavioral configuration
# API keys / base URLs / secrets → .env

agent:
  max_iterations: 30
  max_tool_calls_per_turn: 20

storage:
  data_dir: "./data"
  log_level: "INFO"

compression:
  engine: "compressor"       # compressor (built-in) | lcm (future)
  model: ""                  # empty = use main model; set = cheap model
  max_tokens: 500
  tail_token_budget: 20000
  threshold_ratio: 0.6

toolsets:
  enabled: ["all"]            # ["all"] | ["web","terminal","utility"] | etc.

memory:
  provider: "file"           # file | rag (future)

cron:
  enabled: false

session:
  expire_days: 30

security:
  bash_allow_network: false     # true = allow curl/pip/wget in bash tool
  file_max_write_bytes: 100000  # max file_write size
  audit_enabled: true           # log to data/audit.log

auth:
  enabled: true               # true = enable auth (static + pairing)
  admins: []                  # admin user IDs (always pass, no challenge)
  allowed_users: []           # pre-approved user IDs (skip pairing)
